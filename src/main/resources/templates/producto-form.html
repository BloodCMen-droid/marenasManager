<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Formulario Producto</title>

    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/producto-form.css}">

</head>

<body>

<div class="container">

    <div th:replace="~{fragments/dashboard :: menu}"></div>

    <div class="content">

        <div class="card">

            <h1 th:text="${producto.id == null ?
                '🍖 Nuevo Producto' :
                '✏ Editar Producto'}">
            </h1>

            <form
                th:action="@{/saveProducto}"
                th:object="${producto}"
                method="post">

                <!-- ID oculto para editar -->
                <input  type="hidden" th:field="*{id}">

                <div class="campo">

                    <label>Nombre</label>

                    <input
                        type="text"
                        th:field="*{nombre}"
                        required>

                </div>

                <div class="campo">

                    <label>Descripción</label>

                    <textarea
                        rows="3"
                        th:field="*{descripcion}">
                    </textarea>

                </div>

                <div class="campo">

                    <label>Precio</label>

                    <input
                        type="number"
                        step="0.01"
                        th:field="*{precio}"
                        required>

                </div>

                <div class="campo">

                    <label>Categoría</label>

                    <select
                        th:field="*{categoria.id}">

                        <option value="">
                            Seleccione categoría
                        </option>

                        <option
                            th:each="cat : ${categorias}"
                            th:value="${cat.id}"
                            th:text="${cat.nombre}">
                        </option>

                    </select>

                </div>

                <div class="campo check">

                    <label>Activo</label>

                    <input
                        type="checkbox"
                        th:field="*{activo}">

                </div>

                <div class="acciones">

                    <button type="submit">

                        💾 Guardar

                    </button>

                    <a
                        th:href="@{/listProductos}">

                        ← Regresar

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

<script th:src="@{/js/dashboard.js}"></script>

</body>

</html>
